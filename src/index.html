<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="shortcut icon"
      href="./assets/image/logo.ico"
      type="image/x-icon"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Bluelayer 加速器</title>
    <style>
      :root {
        --bg-color: #eef2f6;
        --panel-color: #ffffff;
        --text-color: #1f2a3c;
        --muted-color: #7b8798;
        --accent-color: #2688ea;
        --border-color: rgba(19, 31, 53, 0.08);
        --shadow-color: rgba(13, 20, 34, 0.16);
        color-scheme: light;
      }

      html[data-theme='dark'] {
        --bg-color: #0a1320;
        --panel-color: #0f1826;
        --text-color: #ffffff;
        --muted-color: rgba(255, 255, 255, 0.72);
        --border-color: rgba(255, 255, 255, 0.08);
        --shadow-color: rgba(0, 0, 0, 0.42);
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        font-size: 16px;
        color: var(--text-color);
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        overflow: hidden;
        -webkit-text-size-adjust: none;
        -moz-text-size-adjust: none;
        -ms-text-size-adjust: none;
        text-size-adjust: none;
      }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #initial-loading-overlay {
        position: fixed;
        inset: 0;
        display: block;
        background: var(--bg-color);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.2s ease-out;
        overflow: hidden;
      }

      #initial-loading-overlay[data-hidden='true'] {
        opacity: 0;
      }

      .initial-loading-card {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 320px 1fr;
        overflow: hidden;
        border-radius: 0;
        background: var(--panel-color);
        border: 0;
        box-shadow: none;
      }

      .initial-loading-side {
        position: relative;
        overflow: hidden;
        padding: 34px 30px;
        color: #ffffff;
        background: linear-gradient(180deg, #7892ee 0%, #7290ee 100%);
      }

      .initial-loading-side::before,
      .initial-loading-side::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
      }

      .initial-loading-side::before {
        width: 118px;
        height: 118px;
        top: 34px;
        right: 28px;
      }

      .initial-loading-side::after {
        width: 138px;
        height: 138px;
        left: 28px;
        bottom: 78px;
      }

      .initial-loading-side-title {
        position: relative;
        z-index: 1;
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .initial-loading-side-subtitle {
        position: relative;
        z-index: 1;
        margin: 8px 0 0;
        font-size: 12px;
        opacity: 0.95;
      }

      .initial-loading-main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 40px;
        text-align: center;
      }

      .initial-loading-logo {
        width: 150px;
        height: 150px;
        object-fit: contain;
      }

      .initial-loading-title {
        margin: 18px 0 0;
        font-size: 42px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #2a3550;
      }

      .initial-loading-spinner {
        width: 24px;
        height: 24px;
        margin: 28px auto 16px;
        border-radius: 999px;
        border: 3px solid var(--border-color);
        border-top-color: var(--accent-color);
        animation: spin 0.85s linear infinite;
      }

      .initial-loading-text {
        margin: 0;
        color: var(--muted-color);
        font-size: 14px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loading-overlay">
      <div class="initial-loading-card">
        <div class="initial-loading-side">
          <h2 class="initial-loading-side-title">Bluelayer加速器</h2>
          <p class="initial-loading-side-subtitle">谦仁网络</p>
        </div>
        <div class="initial-loading-main">
          <img
            class="initial-loading-logo"
            src="./assets/image/bluelayer-logo.png"
            alt="Bluelayer"
          />
          <h1 class="initial-loading-title">Bluelayer</h1>
          <div class="initial-loading-spinner"></div>
          <p class="initial-loading-text">正在加载，请稍候...</p>
        </div>
      </div>
    </div>
    <script>
      if (window.__TAURI_INTERNALS__) {
        window.__TAURI_INTERNALS__
          .invoke('plugin:window|show', { label: 'main' })
          .catch(function () {});
        window.__TAURI_INTERNALS__
          .invoke('plugin:window|set_focus', { label: 'main' })
          .catch(function () {});
      }
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
