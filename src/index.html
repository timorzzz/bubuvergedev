<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="shortcut icon"
      href="./assets/image/logo.ico"
      type="image/x-icon"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluelayer 加速器</title>
    <style>
      :root {
        --bg-color: #f3efe7;
        --panel-color: rgba(255, 250, 242, 0.94);
        --text-color: #1f1810;
        --muted-color: rgba(31, 24, 16, 0.68);
        --accent-color: #ff9f1c;
        --border-color: rgba(31, 24, 16, 0.08);
        --shadow-color: rgba(20, 16, 10, 0.16);
        color-scheme: light;
      }

      html[data-theme='dark'] {
        --bg-color: #0b0b0d;
        --panel-color: rgba(18, 18, 22, 0.92);
        --text-color: #ffffff;
        --muted-color: rgba(255, 255, 255, 0.78);
        --border-color: rgba(255, 255, 255, 0.08);
        --shadow-color: rgba(0, 0, 0, 0.45);
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        color: var(--text-color);
      }

      #root {
        width: 100%;
        height: 100%;
      }

      #initial-loading-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(255, 159, 28, 0.2), transparent 24%),
          radial-gradient(circle at bottom right, rgba(255, 214, 102, 0.08), transparent 24%),
          var(--bg-color);
        z-index: 9999;
        transition: opacity 0.2s ease-out;
      }

      #initial-loading-overlay[data-hidden='true'] {
        opacity: 0;
        pointer-events: none;
      }

      .initial-loading-card {
        width: min(420px, calc(100vw - 48px));
        padding: 48px 32px 36px;
        border-radius: 32px;
        text-align: center;
        background: var(--panel-color);
        border: 1px solid var(--border-color);
        box-shadow: 0 32px 80px var(--shadow-color);
      }

      .initial-loading-logo-wrap {
        width: 168px;
        height: 168px;
        margin: 0 auto 22px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle, rgba(255, 185, 79, 0.5), transparent 62%),
          rgba(255, 159, 28, 0.08);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 20px 60px rgba(255, 159, 28, 0.18);
      }

      .initial-loading-logo {
        width: 126px;
        height: 126px;
        object-fit: contain;
      }

      .initial-loading-title {
        margin: 0;
        font-size: 44px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .initial-loading-spinner {
        width: 28px;
        height: 28px;
        margin: 28px auto 18px;
        border-radius: 999px;
        border: 3px solid var(--border-color);
        border-top-color: var(--accent-color);
        animation: spin 0.85s linear infinite;
      }

      .initial-loading-text {
        margin: 0;
        color: var(--muted-color);
        font-size: 14px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loading-overlay">
      <div class="initial-loading-card">
        <div class="initial-loading-logo-wrap">
          <img
            class="initial-loading-logo"
            src="./assets/image/bluelayer-logo.png"
            alt="Bluelayer"
          />
        </div>
        <h1 class="initial-loading-title">BLUELAYER</h1>
        <div class="initial-loading-spinner"></div>
        <p class="initial-loading-text">桌面客户端正在加载，请稍候...</p>
      </div>
    </div>
    <script>
      if (window.__TAURI_INTERNALS__) {
        window.__TAURI_INTERNALS__
          .invoke('plugin:window|show', { label: 'main' })
          .catch(function () {});
        window.__TAURI_INTERNALS__
          .invoke('plugin:window|set_focus', { label: 'main' })
          .catch(function () {});
      }
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
